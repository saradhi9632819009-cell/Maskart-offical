version: "3.8"

services:
  app:
    image: ${DOCKER_USERNAME}/flask-app:latest
    container_name: flask-app
    expose:
      - "5000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always