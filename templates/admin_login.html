<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - MASKART</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #1e3a8a;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #1e40af;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .password-info {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #166534;
        }

        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }

        @media (max-width: 768px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            body {
                padding: 20px 0;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="{{ url_for('home') }}" style="text-decoration: none;"><div class="logo">MASKART</div></a>
</nav>

<div class="login-container">
    <div class="login-header">
        <h1>⚙️ Admin Panel</h1>
        <p>Enter password to access admin dashboard</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
        🔒 {{ error }}
    </div>
    {% endif %}

    <div class="password-info">
        💡 Hint: Password is 8 digits starting with 1
    </div>

    <form method="POST" action="{{ url_for('admin_login_submit') }}">
        <div class="form-group">
            <label for="password">Admin Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter admin password" 
                required 
                autofocus
            >
        </div>
        <button type="submit" class="login-btn">🔓 Login to Admin</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('home') }}">← Back to Home</a>
    </div>
</div>

</body>
</html>
